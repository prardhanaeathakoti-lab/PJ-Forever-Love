<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background:#ffb6c1;
    color: white;
    overflow: hidden;
}

/* QUESTION */
#question {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

button {
    padding: 15px 25px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

#yes {
    background: #22c55e;
}

#no {
    background: #ef4444;
    position: absolute;
}

/* MAIN */
#main {
    display: none;
    width: 100%;
    height: 100vh;
    position: relative;
}

#main img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(60%);
}

.text {
    position: absolute;
    bottom: 20%;
    left:50%
    transform: translateX(-50%);
    width: 100%;
    text-aline:center
    font-weight: bold;
    text-shadow: 2px 2px 10px black;

h1 {
    font-size: 45px;
}

/* BIGGER QUOTE 💖 */
#quote {
    font-size: 40px;
    margin-top: 15px;
    line-height: 1.6;
}

/* HEARTS */
.heart {
    position: absolute;
    color: pink;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<div id="question">
    <h1>Will you be my forever? ❤️</h1>
    <button id="yes" onclick="showPage()">YES 💖</button>
    <button id="no">NO 😜</button>
</div>

<div id="main">
    <img src="photo.jpg">

    <div class="text">
        <h1>Happy Anniversary My Love ❤️</h1>
        <p id="quote"></p>
    </div>
</div>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// NO ESCAPE
const noBtn = document.getElementById("no");
noBtn.addEventListener("mouseover", () => {
    noBtn.style.top = Math.random() * 80 + "%";
    noBtn.style.left = Math.random() * 80 + "%";
});

// YES CLICK
function showPage() {
    document.getElementById("question").style.display = "none";
    document.getElementById("main").style.display = "block";
    startTyping();
    startHearts();
    document.getElementById("music").play();
}

// TYPING
const text = "You're the only one I want to annoy for the rest of my life ❤️";
let i = 0;

function startTyping() {
    let speed = 40;
    function type() {
        if (i < text.length) {
            document.getElementById("quote").innerHTML += text.charAt(i);
            i++;
            setTimeout(type, speed);
        }
    }
    type();
}

// HEARTS
function startHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.innerHTML = "❤️";
        heart.className = "heart";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 25 + 15) + "px";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }, 300);
}
</script>

</body>
</html>
