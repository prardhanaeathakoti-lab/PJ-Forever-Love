<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: black;
    color: white;
    overflow: hidden;
}

#question {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#yes { background: green; }
#no  { background: red; position: absolute; }

#main {
    display: none;
    width: 100%;
    height: 100vh;
    position: relative;
}

#main img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(60%);
}

.text {
    position: absolute;
    bottom: 20%;
    width: 100%;
}

#quote {
    font-size: 28px;
    margin-top: 10px;
}

/* hearts */
@keyframes fall {
  to {
    transform: translateY(100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div id="question">
    <h1>Will you be my forever? ❤️</h1>
    <button id="yes" onclick="showPage()">YES 💖</button>
    <button id="no" onmouseover="moveNo()">NO 😜</button>
</div>

<div id="main">
    <img src="photo.jpg">

    <div class="text">
        <h1>Happy Anniversary My Love ❤️</h1>
        <p id="quote"></p>
    </div>
</div>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

// NO escape
function moveNo() {
    let b = document.getElementById("no");
    b.style.top = Math.random()*80 + "%";
    b.style.left = Math.random()*80 + "%";
}

// YES click
function showPage() {
    document.getElementById("question").style.display = "none";
    document.getElementById("main").style.display = "block";

    startTyping();
    startHearts();

    document.getElementById("music").play().catch(()=>{});
}

// ✅ FIXED typing (IMPORTANT RESET)
function startTyping() {
    let text = "You're the only one I want to annoy for the rest of my life ❤️";
    let i = 0;
    let quote = document.getElementById("quote");
    quote.innerHTML = ""; // reset

    function type() {
        if (i < text.length) {
            quote.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 40);
        }
    }
    type();
}

// hearts
function startHearts() {
    setInterval(() => {
        let h = document.createElement("div");
        h.innerHTML = "❤️";
        h.style.position = "fixed";
        h.style.left = Math.random()*100 + "vw";
        h.style.top = "-10px";
        h.style.fontSize = "24px";
        h.style.animation = "fall 3s linear";

        document.body.appendChild(h);
        setTimeout(()=>h.remove(),3000);
    }, 300);
}

</script>

</body>
</html>
