<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: black;
    color: white;
}

#question {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius:10px;
    cursor: pointer;
}

#yes {
    background: green;
}

#no {
    background: red;
    position: absolute;
}

#main {
    display: none;
    text-align: center;
}

img {
    width: 100%;
    height: 100vh;
    object-fit: cover;
}
</style>
</head>

<body>

<div id="question">
    <h1>Will you be my forever? ❤️</h1>
    <button id="yes" onclick="showPage()">YES 💖</button>
    <button id="no" onmouseover="moveNoButton()">NO 😜</button>
</div>

<div id="main">
    <img src="photo.jpg">
    <h1 style="position:absolute; bottom:20%; width:100%;">
        Happy Anniversary My Love ❤️
    </h1>
</div>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

function moveNoButton() {
    var btn = document.getElementById("no");
    btn.style.top = Math.random() * 80 + "%";
    btn.style.left = Math.random() * 80 + "%";
}

function showPage() {
    document.getElementById("question").style.display = "none";
    document.getElementById("main").style.display = "block";

    document.getElementById("music").play();
}
    
    const text = "You're the only one I want to annoy for the rest of my life ❤️";
let i = 0;

function startTyping() {
  let speed = 40;
  function type() {
    if (i < text.length) {
      document.getElementById("quote").innerHTML += text.charAt(i);
      i++;
      setTimeout(type, speed);
    }
  }
  type();
}

</script>

</body>
</html>
